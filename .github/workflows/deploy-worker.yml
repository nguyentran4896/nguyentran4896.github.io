name: Deploy Chat Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Sync secrets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e '
            const fs = require("fs");
            fs.writeFileSync("/tmp/secrets.json", JSON.stringify({
              GROQ_API_KEY: process.env.GROQ_API_KEY,
              TELEGRAM_BOT_TOKEN: process.env.TELEGRAM_BOT_TOKEN,
              TELEGRAM_CHAT_ID: process.env.TELEGRAM_CHAT_ID,
            }));
          '
          npx wrangler secret bulk /tmp/secrets.json
          rm -f /tmp/secrets.json

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy 2>&1 | tee deploy.log

      - name: Surface worker URL
        run: |
          URL=$(grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' worker/deploy.log | head -1 || true)
          if [ -z "$URL" ]; then
            URL=$(grep -Eo 'https://[a-z0-9.-]+\.workers\.dev' worker/deploy.log | head -1 || true)
          fi
          echo "Deployed worker URL: $URL"
          echo "## 💬 Chat worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint: \`${URL}/chat\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If this is the first deploy, set the repo variable so Pages rebuilds with the chat widget visible:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gh variable set NEXT_PUBLIC_CHAT_ENDPOINT --body '${URL}/chat'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        working-directory: .
